name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5432/rag
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: ragadmin
      MINIO_SECRET_KEY: ragadminsecret
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      # MinIO can't be a GH Actions `services:` entry: the official image's
      # ENTRYPOINT needs `server /data` as an argument or it just prints
      # usage and exits, and `services:` has no way to set a container's
      # command/args (only `options`, which maps to `docker create` flags,
      # not the trailing command) — a well-known upstream limitation
      # (minio/minio#21506). Running it as a plain `docker run` step is the
      # standard workaround.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9002:9000 \
            -e MINIO_ROOT_USER=ragadmin -e MINIO_ROOT_PASSWORD=ragadminsecret \
            minio/minio server /data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for MinIO + create bucket
        # backend/tests/conftest.py's session-scoped autouse fixture also
        # calls ensure_bucket_exists, but doing it here first fails fast
        # with a clear error if MinIO never comes up, instead of every
        # single test erroring out with a connection-refused traceback.
        run: |
          python -c "
          import time
          from minio import Minio
          client = Minio('localhost:9002', access_key='ragadmin', secret_key='ragadminsecret', secure=False)
          for _ in range(30):
              try:
                  if not client.bucket_exists('rag-documents'):
                      client.make_bucket('rag-documents')
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('MinIO never became ready')
          "

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true

      - name: Apply migrations
        run: alembic upgrade head

      - name: Unit + integration tests
        run: pytest --cov=app --cov-report=term-missing

      - name: Dependency vulnerability scan (pip-audit)
        # Non-blocking for now (same as mypy above) until an initial pass has
        # reviewed and triaged whatever it currently reports.
        run: pip-audit
        continue-on-error: true

  worker:
    name: Worker (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      chroma:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000
    env:
      DATABASE_URL: postgresql+psycopg://rag:rag@localhost:5432/rag
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      CHROMA_URL: http://localhost:8000
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: ragadmin
      MINIO_SECRET_KEY: ragadminsecret
    steps:
      - uses: actions/checkout@v4

      # See the backend job's "Start MinIO" step for why this can't be a
      # `services:` entry (minio/minio#21506).
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9002:9000 \
            -e MINIO_ROOT_USER=ragadmin -e MINIO_ROOT_PASSWORD=ragadminsecret \
            minio/minio server /data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: worker/pyproject.toml

      - name: Install worker dependencies
        run: pip install -e ".[dev]"

      - name: Install backend dependencies (for migrations only)
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Wait for MinIO + create bucket
        # Worker's own tests have no bucket-creation fixture of their own
        # (unlike backend's) — they assume the bucket already exists, true
        # in local dev where backend creates it in the same shared MinIO,
        # but this job gets its own isolated MinIO instance.
        run: |
          python -c "
          import time
          from minio import Minio
          client = Minio('localhost:9002', access_key='ragadmin', secret_key='ragadminsecret', secure=False)
          for _ in range(30):
              try:
                  if not client.bucket_exists('rag-documents'):
                      client.make_bucket('rag-documents')
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('MinIO never became ready')
          "

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5432/rag
        run: alembic upgrade head

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests
        run: pytest

      - name: Dependency vulnerability scan (pip-audit)
        # Non-blocking for now, same reasoning as the backend job's step.
        run: pip-audit
        continue-on-error: true

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Dependency vulnerability scan (npm audit)
        # Non-blocking for now, same reasoning as the backend/worker pip-audit steps.
        run: npm audit --audit-level=high
        continue-on-error: true

  build-validation:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [backend, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rag-backend:ci ./backend

      - name: Build worker image
        run: docker build -t rag-worker:ci ./worker

      - name: Build frontend image
        run: docker build -t rag-frontend:ci ./frontend
